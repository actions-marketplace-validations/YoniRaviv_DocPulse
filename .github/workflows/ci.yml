name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync deps
        run: uv sync --all-extras --dev
      - name: Ruff
        run: uv run ruff check
      - name: Pytest
        run: uv run pytest -q

  eval:
    name: verifier eval (precision gate)
    runs-on: ubuntu-latest
    needs: test
    # Skip on fork PRs (org secrets are unavailable there); pushes and same-repo PRs
    # proceed, then bail out in-shell if ANTHROPIC_API_KEY is unset.
    if: ${{ github.event_name == 'push' || github.repository == github.event.pull_request.head.repo.full_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - run: uv sync --all-extras --dev
      - name: Run eval with precision gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY not set — skipping live eval."
            exit 0
          fi
          uv run docpulse eval \
            --cases evals/cases \
            --model anthropic/claude-haiku-4-5 \
            --min-precision 0.90
